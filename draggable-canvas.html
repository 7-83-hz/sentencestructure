<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Tiles</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --white: #ffffff;
      --grey: #9e9086;
      --grey-light: #e8e3de;
      --grey-mid: #c4bcb4;
      --blue: #2563ff;
      --blue-hover: #1a4edb;
      --text: #1a1816;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: var(--text);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--grey-light);
      flex-shrink: 0;
      background: var(--white);
      z-index: 10;
    }

    .wordmark {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text);
    }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .header-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-radius: 100px;
      border: 1.5px solid var(--blue);
      background: var(--blue);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .header-btn:hover { background: var(--blue-hover); border-color: var(--blue-hover); }
    .header-btn.off {
      background: transparent;
      color: var(--blue);
      border-color: var(--blue);
    }
    .header-btn.off:hover { background: var(--grey-light); }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; min-height: 0; }

    /* ── Sidebar ── */
    aside {
      width: 180px;
      flex-shrink: 0;
      border-right: 1px solid var(--grey-light);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 4px;
      overflow-y: auto;
      background: var(--white);
    }

    .sidebar-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--grey);
      text-transform: uppercase;
      padding: 0 4px 8px;
    }

    .tile-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--text);
      transition: background 0.12s;
      text-align: left;
      width: 100%;
    }
    .tile-btn:hover { background: var(--grey-light); }
    .tile-btn:active { transform: scale(0.98); }
    .tile-btn.loading { opacity: 0.45; cursor: wait; pointer-events: none; }

    .tile-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--grey-mid);
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .tile-btn.loaded .tile-dot { background: var(--blue); }

    /* ── Canvas ── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--white);
    }
    #three-canvas { display: block; width: 100%; height: 100%; }
    #canvas-wrap.rotate-mode { cursor: grab; }
    #canvas-wrap.rotate-mode:active { cursor: grabbing; }

    .empty-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      color: var(--grey-mid);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 2.2;
      letter-spacing: 0.04em;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--grey-light);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .status-pill {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--grey);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
    #obj-count { color: var(--text); }
    #selected-status { display: none; }
    #hint { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--grey-mid); margin-left: auto; }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      flex-direction: column;
      gap: 14px;
      transition: opacity 0.35s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--grey-light);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--grey);
      letter-spacing: 0.06em;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 100px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <span class="loading-text">initialising...</span>
</div>

<header>
  <span class="wordmark">WORD TILES</span>
  <div class="header-right">
    <button id="spin-btn" class="header-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 7C2 4.24 4.24 2 7 2C9.76 2 12 4.24 12 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M9.5 5.5L12 7l2.5-1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="spin-label">Auto-spin on</span>
    </button>
    <button id="mode-btn" class="header-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M7 1.5C7 1.5 9.5 4 9.5 7C9.5 10 7 12.5 7 12.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M1.5 7H12.5" stroke="currentColor" stroke-width="1.4"/>
      </svg>
      <span id="mode-label">Rotate mode</span>
    </button>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-label">Word tiles</div>
    <!-- Buttons injected by JS -->
  </aside>

  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>
    <div class="empty-msg" id="empty-msg">
      select a word from the sidebar<br>to place it on the canvas
    </div>
  </div>
</div>

<footer>
  <div class="status-pill">
    <div class="status-dot"></div>
    <span id="obj-count">0 tiles</span>
  </div>
  <div class="status-pill" id="selected-status">
    <span>selected:</span>
    <span id="selected-name" style="color:var(--text)"></span>
    <span style="color:var(--grey-mid)">· del to remove</span>
  </div>
  <span id="hint">select a word · drag to move · del to remove</span>
</footer>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ── Tile definitions ──────────────────────────────────────────────
// Each word maps to its GLB file in the tiles/ folder.
// Add or remove entries here when you add new tiles.
const TILES = [
  'a', 'star', 'into', 'turns', 'every', 'being',
  'on', 'earth', 'of', 'water', 'fire', 'and', 'again', 'back'
];

// ── Build sidebar buttons ─────────────────────────────────────────
const aside = document.querySelector('aside');
TILES.forEach(word => {
  const btn = document.createElement('button');
  btn.className = 'tile-btn';
  btn.id = 'btn-' + word;
  btn.innerHTML = `<span class="tile-dot"></span>${word}`;
  btn.addEventListener('click', () => addTile(word));
  aside.appendChild(btn);
});

// ── Three.js scene ────────────────────────────────────────────────
const wrap   = document.getElementById('canvas-wrap');
const canvas = document.getElementById('three-canvas');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0xffffff, 1);
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(0, 0, 22);

// Simple flat lighting — no drama
const ambient = new THREE.AmbientLight(0xffffff, 0.95);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
dirLight.position.set(4, 6, 10);
scene.add(dirLight);

// ── State ─────────────────────────────────────────────────────────
let objects   = [];   // { pivot, word, id }
let selected  = null;
let mode      = 'move';
let autoSpin  = true;
let idCounter = 0;
const tileCache  = {};  // word → cloneable THREE.Group
const dragPlane  = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
const raycaster  = new THREE.Raycaster();
const mouse      = new THREE.Vector2();

// ── Load a tile and place it ──────────────────────────────────────
async function addTile(word) {
  const btn = document.getElementById('btn-' + word);
  btn.classList.add('loading');

  try {
    let group;

    if (tileCache[word]) {
      // Re-use cached geometry
      group = tileCache[word].clone(true);
    } else {
      // Load from tiles/ folder
      const url = `tiles/${word}.glb`;
      const gltf = await new Promise((resolve, reject) => {
        window._gltfLoader.load(url, resolve, undefined, reject);
      });

      // Normalise scale so all tiles are similar size
      const box   = new THREE.Box3().setFromObject(gltf.scene);
      const size  = box.getSize(new THREE.Vector3());
      const scale = 2.5 / Math.max(size.x, size.y, size.z);
      gltf.scene.scale.setScalar(scale);

      // Shift so pivot is at centre of model
      const centre = box.getCenter(new THREE.Vector3()).multiplyScalar(scale);
      gltf.scene.position.sub(centre);

      tileCache[word] = gltf.scene;
      group = gltf.scene.clone(true);
    }

    // Wrap in a pivot group so position/rotation are independent
    const pivot = new THREE.Group();
    pivot.add(group);
    pivot.position.set(
      (Math.random() - 0.5) * 7,
      (Math.random() - 0.5) * 3.5,
      0
    );

    const id = ++idCounter;
    pivot.userData = { id, word };

    scene.add(pivot);
    objects.push({ pivot, word, id });
    updateCount();
    selectObject(pivot);
    document.getElementById('empty-msg').style.display = 'none';

    btn.classList.remove('loading');
    btn.classList.add('loaded');

  } catch (err) {
    console.error('Could not load tile:', word, err);
    showToast(`could not load "${word}" — check tiles/${word}.glb exists`);
    btn.classList.remove('loading');
  }
}

// ── Selection helpers ─────────────────────────────────────────────
function setEmissive(pivot, hex) {
  pivot.traverse(child => {
    if (child.isMesh && child.material) {
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach(m => { if (m.emissive) m.emissive.setHex(hex); });
    }
  });
}

function selectObject(pivot) {
  if (selected && selected !== pivot) setEmissive(selected, 0x000000);
  selected = pivot;
  if (pivot) {
    setEmissive(pivot, 0x0f2a99);
    document.getElementById('selected-status').style.display = '';
    document.getElementById('selected-name').textContent = pivot.userData.word;
    pivot.renderOrder = 1;
  } else {
    document.getElementById('selected-status').style.display = 'none';
  }
}

function deselect() {
  if (selected) { setEmissive(selected, 0x000000); selected = null; }
  document.getElementById('selected-status').style.display = 'none';
}

function updateCount() {
  const n = objects.length;
  document.getElementById('obj-count').textContent = n + ' tile' + (n !== 1 ? 's' : '');
}

// ── Raycasting — find which pivot was hit ─────────────────────────
function hitPivot(e) {
  const rect = wrap.getBoundingClientRect();
  mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const meshes = [];
  objects.forEach(o => o.pivot.traverse(c => { if (c.isMesh) meshes.push(c); }));
  const hits = raycaster.intersectObjects(meshes);
  if (!hits.length) return null;

  // Walk up to find the pivot group
  let obj = hits[0].object;
  while (obj && !obj.userData.id) obj = obj.parent;
  return (obj && obj.userData.id) ? obj : null;
}

// ── Drag interaction ──────────────────────────────────────────────
let isDragging    = false;
let dragTarget    = null;
let dragOffset    = new THREE.Vector3();
let rotStartMouse = { x: 0, y: 0 };
let rotStartQuat  = new THREE.Quaternion();
let mouseDownPos  = { x: 0, y: 0 };

wrap.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  mouseDownPos = { x: e.clientX, y: e.clientY };
  const hit = hitPivot(e);

  if (mode === 'move') {
    if (hit) {
      selectObject(hit);
      isDragging = true;
      dragTarget = hit;
      raycaster.setFromCamera(mouse, camera);
      const pt = new THREE.Vector3();
      raycaster.ray.intersectPlane(dragPlane, pt);
      dragOffset.copy(pt).sub(hit.position);
      e.preventDefault();
    }
  } else {
    if (hit) {
      if (hit !== selected) selectObject(hit);
      isDragging = true;
      dragTarget = hit;
      rotStartMouse = { x: e.clientX, y: e.clientY };
      rotStartQuat.copy(hit.quaternion);
      e.preventDefault();
    }
  }
});

window.addEventListener('mousemove', e => {
  if (!isDragging || !dragTarget) return;

  if (mode === 'move') {
    raycaster.setFromCamera(mouse, camera);
    const pt = new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPlane, pt);
    dragTarget.position.copy(pt.sub(dragOffset));
  } else {
    const dx = (e.clientX - rotStartMouse.x) / wrap.offsetWidth;
    const dy = (e.clientY - rotStartMouse.y) / wrap.offsetHeight;
    const speed = 3.5;
    const qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), dx * speed);
    const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), dy * speed);
    dragTarget.quaternion.copy(rotStartQuat).premultiply(qX).premultiply(qY);
  }
});

window.addEventListener('mouseup', e => {
  // If mouse barely moved, treat as a click (deselect if no hit)
  const moved = Math.abs(e.clientX - mouseDownPos.x) + Math.abs(e.clientY - mouseDownPos.y) > 4;
  if (!moved && !hitPivot(e)) deselect();
  isDragging = false;
  dragTarget = null;
});

// ── Delete ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.activeElement !== document.body) return;
  if ((e.key === 'Delete' || e.key === 'Backspace') && selected) {
    scene.remove(selected);
    objects = objects.filter(o => o.pivot !== selected);
    deselect();
    updateCount();
    if (objects.length === 0) document.getElementById('empty-msg').style.display = '';
    showToast('tile removed');
  }
});

// ── Buttons ───────────────────────────────────────────────────────
document.getElementById('spin-btn').addEventListener('click', function () {
  autoSpin = !autoSpin;
  this.classList.toggle('off', !autoSpin);
  document.getElementById('spin-label').textContent = autoSpin ? 'Auto-spin on' : 'Auto-spin off';
});

document.getElementById('mode-btn').addEventListener('click', function () {
  mode = mode === 'move' ? 'rotate' : 'move';
  const isRotate = mode === 'rotate';
  document.getElementById('mode-label').textContent = isRotate ? 'Move mode' : 'Rotate mode';
  wrap.classList.toggle('rotate-mode', isRotate);
  document.getElementById('hint').textContent = isRotate
    ? 'drag to rotate in 3d · click empty to deselect'
    : 'select a word · drag to move · del to remove';
});

// ── Toast ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Resize ────────────────────────────────────────────────────────
function resize() {
  const w = wrap.offsetWidth, h = wrap.offsetHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ── Render loop ───────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  if (autoSpin) {
    objects.forEach(({ pivot }) => {
      if (pivot !== selected) {
        pivot.rotation.y += 0.004;
        pivot.rotation.x += 0.001;
      }
    });
  }
  renderer.render(scene, camera);
}
animate();

// ── Init: load GLTFLoader then hide overlay ───────────────────────
(function loadGLTFLoader() {
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  script.onload = () => {
    window._gltfLoader = new THREE.GLTFLoader();
    const overlay = document.getElementById('loading-overlay');
    overlay.classList.add('hidden');
    setTimeout(() => overlay.style.display = 'none', 400);
  };
  script.onerror = () => {
    document.querySelector('.loading-text').textContent = 'failed to load — check connection';
  };
  document.head.appendChild(script);
})();

</script>
</body>
</html>
