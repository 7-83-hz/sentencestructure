<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Object Canvas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --white: #ffffff;
      --grey: #9e9086;
      --grey-light: #e8e3de;
      --grey-mid: #c4bcb4;
      --blue: #2563ff;
      --blue-hover: #1a4edb;
      --text: #1a1816;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: var(--text);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--grey-light);
      flex-shrink: 0;
      background: var(--white);
      z-index: 10;
    }

    .wordmark {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Header buttons shared style */
    .header-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-radius: 100px;
      border: 1.5px solid var(--blue);
      background: var(--blue);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .header-btn:hover { background: var(--blue-hover); border-color: var(--blue-hover); }
    .header-btn svg { flex-shrink: 0; }

    /* Auto-spin off state — outlined */
    #spin-btn.off {
      background: transparent;
      color: var(--blue);
      border-color: var(--blue);
    }
    #spin-btn.off:hover { background: var(--grey-light); border-color: var(--blue-hover); color: var(--blue-hover); }

    /* ── Main layout ── */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Sidebar ── */
    aside {
      width: 200px;
      flex-shrink: 0;
      border-right: 1px solid var(--grey-light);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 6px;
      overflow-y: auto;
      background: var(--white);
    }

    .sidebar-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--grey);
      text-transform: uppercase;
      padding: 0 4px 6px;
    }

    .shape-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      transition: background 0.12s, border-color 0.12s;
      text-align: left;
    }
    .shape-btn:hover { background: var(--grey-light); }
    .shape-btn:active { transform: scale(0.98); }

    .shape-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--grey-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 15px;
    }

    .shape-name { font-weight: 400; }

    /* ── Canvas area ── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--white);
    }

    #three-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Crosshair cursor in rotate mode */
    #canvas-wrap.rotate-mode { cursor: grab; }
    #canvas-wrap.rotate-mode:active { cursor: grabbing; }

    /* Object label tags */
    .obj-label {
      position: absolute;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--grey);
      background: var(--white);
      border: 1px solid var(--grey-light);
      border-radius: 4px;
      padding: 2px 6px;
      pointer-events: none;
      white-space: nowrap;
      transform: translateX(-50%);
    }

    /* ── Status bar ── */
    footer {
      border-top: 1px solid var(--grey-light);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .status-pill {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--grey);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--blue);
      flex-shrink: 0;
    }

    #obj-count { color: var(--text); }

    /* Selection ring hint */
    #hint {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--grey-mid);
      margin-left: auto;
    }

    /* Delete toast */
    #del-hint {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 100px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #del-hint.show { opacity: 1; }
  </style>
</head>
<body>

  <header>
    <span class="wordmark">3D CANVAS</span>
    <div class="header-right">
      <button id="spin-btn" class="header-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7C2 4.24 4.24 2 7 2C9.76 2 12 4.24 12 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M10 5l2 2 2-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="spin-label">Auto-spin on</span>
      </button>
      <button id="mode-btn" class="header-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="5.5" stroke="white" stroke-width="1.4"/>
          <path d="M7 1.5C7 1.5 9.5 4 9.5 7C9.5 10 7 12.5 7 12.5" stroke="white" stroke-width="1.4"/>
          <path d="M1.5 7H12.5" stroke="white" stroke-width="1.4"/>
        </svg>
        <span id="mode-label">Rotate mode</span>
      </button>
    </div>
  </header>

  <div class="layout">
    <aside>
      <div class="sidebar-label">Add shape</div>
      <button class="shape-btn" onclick="addShape('box')">
        <div class="shape-icon">▪</div>
        <span class="shape-name">Cube</span>
      </button>
      <button class="shape-btn" onclick="addShape('sphere')">
        <div class="shape-icon">●</div>
        <span class="shape-name">Sphere</span>
      </button>
      <button class="shape-btn" onclick="addShape('cylinder')">
        <div class="shape-icon">⬭</div>
        <span class="shape-name">Cylinder</span>
      </button>
      <button class="shape-btn" onclick="addShape('cone')">
        <div class="shape-icon">△</div>
        <span class="shape-name">Cone</span>
      </button>
      <button class="shape-btn" onclick="addShape('torus')">
        <div class="shape-icon">◎</div>
        <span class="shape-name">Torus</span>
      </button>
      <button class="shape-btn" onclick="addShape('tetrahedron')">
        <div class="shape-icon">◇</div>
        <span class="shape-name">Pyramid</span>
      </button>
      <button class="shape-btn" onclick="addShape('octahedron')">
        <div class="shape-icon">⬡</div>
        <span class="shape-name">Octahedron</span>
      </button>
      <button class="shape-btn" onclick="addShape('torusknot')">
        <div class="shape-icon">∞</div>
        <span class="shape-name">Knot</span>
      </button>
    </aside>

    <div id="canvas-wrap">
      <canvas id="three-canvas"></canvas>
    </div>
  </div>

  <footer>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span id="obj-count">0 objects</span>
    </div>
    <div class="status-pill" id="selected-status" style="display:none">
      <span>selected:</span>
      <span id="selected-name" style="color:var(--text)"></span>
      <span style="color:var(--grey-mid)">· del to remove</span>
    </div>
    <span id="hint">click to select · drag to interact</span>
  </footer>

  <div id="del-hint">Object removed</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ── Scene setup ──────────────────────────────────────────────
    const wrap = document.getElementById('canvas-wrap');
    const canvas = document.getElementById('three-canvas');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0xffffff, 1);
    renderer.shadowMap.enabled = false;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    // Camera — orthographic-ish perspective to keep things clean
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
    camera.position.set(0, 0, 18);

    // Lighting — simple, flat-ish
    const ambient = new THREE.AmbientLight(0xffffff, 0.85);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(5, 8, 10);
    scene.add(dirLight);

    // ── State ─────────────────────────────────────────────────────
    let objects = [];       // { mesh, name, id }
    let selected = null;
    let mode = 'move';      // 'move' | 'rotate'
    let autoSpin = true;
    let idCounter = 0;

    const BLUE   = 0x2563ff;
    const GREY   = 0x9e9086;
    const COLORS = [0x2563ff, 0x6c93ff, 0xb0c4ff, 0x9e9086, 0xc4bcb4, 0x5a4fff, 0xff6b35, 0x35c0ff];
    let colorIdx = 0;

    // ── Geometry factory ─────────────────────────────────────────
    const SHAPE_NAMES = {
      box: 'Cube', sphere: 'Sphere', cylinder: 'Cylinder',
      cone: 'Cone', torus: 'Torus', tetrahedron: 'Pyramid',
      octahedron: 'Octahedron', torusknot: 'Knot'
    };

    function makeGeometry(type) {
      switch(type) {
        case 'box':          return new THREE.BoxGeometry(1.6, 1.6, 1.6);
        case 'sphere':       return new THREE.SphereGeometry(1, 32, 32);
        case 'cylinder':     return new THREE.CylinderGeometry(0.8, 0.8, 1.8, 32);
        case 'cone':         return new THREE.ConeGeometry(1, 2, 32);
        case 'torus':        return new THREE.TorusGeometry(0.9, 0.35, 16, 64);
        case 'tetrahedron':  return new THREE.TetrahedronGeometry(1.2);
        case 'octahedron':   return new THREE.OctahedronGeometry(1.1);
        case 'torusknot':    return new THREE.TorusKnotGeometry(0.7, 0.25, 120, 16);
        default:             return new THREE.BoxGeometry(1.6, 1.6, 1.6);
      }
    }

    function addShape(type) {
      const geo = makeGeometry(type);
      const color = COLORS[colorIdx % COLORS.length];
      colorIdx++;
      const mat = new THREE.MeshPhongMaterial({
        color,
        shininess: 40,
        specular: 0x333333,
      });
      const mesh = new THREE.Mesh(geo, mat);

      // Spread objects out on add
      const spread = 5;
      mesh.position.set(
        (Math.random() - 0.5) * spread,
        (Math.random() - 0.5) * spread * 0.6,
        0
      );
      mesh.rotation.set(
        Math.random() * Math.PI,
        Math.random() * Math.PI,
        0
      );

      const id = ++idCounter;
      const name = SHAPE_NAMES[type] + ' ' + id;
      mesh.userData = { id, name, type };

      scene.add(mesh);
      objects.push({ mesh, name, id });
      updateCount();
      selectObject(mesh);
    }

    // ── Selection ─────────────────────────────────────────────────
    const SEL_EMISSIVE = new THREE.Color(0x1133aa);
    const NO_EMISSIVE  = new THREE.Color(0x000000);

    function selectObject(mesh) {
      // Deselect old
      if (selected && selected !== mesh) {
        selected.material.emissive.copy(NO_EMISSIVE);
        selected.material.wireframe = false;
      }
      selected = mesh;
      if (mesh) {
        mesh.material.emissive.copy(SEL_EMISSIVE);
        document.getElementById('selected-status').style.display = '';
        document.getElementById('selected-name').textContent = mesh.userData.name;
      } else {
        document.getElementById('selected-status').style.display = 'none';
      }
    }

    function deselect() {
      if (selected) {
        selected.material.emissive.copy(NO_EMISSIVE);
        selected = null;
      }
      document.getElementById('selected-status').style.display = 'none';
    }

    function updateCount() {
      const n = objects.length;
      document.getElementById('obj-count').textContent = n + ' object' + (n !== 1 ? 's' : '');
    }

    // ── Auto-spin toggle ──────────────────────────────────────────
    const spinBtn   = document.getElementById('spin-btn');
    const spinLabel = document.getElementById('spin-label');
    const SPIN_ON_SVG  = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7C2 4.24 4.24 2 7 2C9.76 2 12 4.24 12 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M10 5l2 2 2-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const SPIN_OFF_SVG = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7C2 4.24 4.24 2 7 2C9.76 2 12 4.24 12 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="2 2"/><path d="M10 5l2 2 2-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 3l8 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`;

    spinBtn.addEventListener('click', () => {
      autoSpin = !autoSpin;
      if (autoSpin) {
        spinBtn.classList.remove('off');
        spinBtn.innerHTML = SPIN_ON_SVG + '<span id="spin-label">Auto-spin on</span>';
      } else {
        spinBtn.classList.add('off');
        spinBtn.innerHTML = SPIN_OFF_SVG + '<span id="spin-label">Auto-spin off</span>';
      }
    });

    // ── Mode toggle ───────────────────────────────────────────────
    const modeBtn   = document.getElementById('mode-btn');
    const modeLabel = document.getElementById('mode-label');

    const MOVE_ICON = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12M4 4l-3 3 3 3M10 4l3 3-3 3" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const ROT_ICON  = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="white" stroke-width="1.4"/><path d="M7 1.5C7 1.5 9.5 4 9.5 7C9.5 10 7 12.5 7 12.5" stroke="white" stroke-width="1.4"/><path d="M1.5 7H12.5" stroke="white" stroke-width="1.4"/></svg>`;

    modeBtn.addEventListener('click', () => {
      mode = mode === 'move' ? 'rotate' : 'move';
      if (mode === 'rotate') {
        modeLabel.textContent = 'Move mode';
        modeBtn.innerHTML = ROT_ICON + '<span id="mode-label">Move mode</span>';
        wrap.classList.add('rotate-mode');
        document.getElementById('hint').textContent = 'drag to rotate selected · click canvas to move';
      } else {
        modeLabel.textContent = 'Rotate mode';
        modeBtn.innerHTML = MOVE_ICON + '<span id="mode-label">Rotate mode</span>';
        wrap.classList.remove('rotate-mode');
        document.getElementById('hint').textContent = 'click to select · drag to interact';
      }
    });

    // ── Raycaster ─────────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function getMouseNDC(e) {
      const rect = wrap.getBoundingClientRect();
      mouse.x =  ((e.clientX - rect.left)  / rect.width)  * 2 - 1;
      mouse.y = -((e.clientY - rect.top)   / rect.height) * 2 + 1;
    }

    function raycastObjects(e) {
      getMouseNDC(e);
      raycaster.setFromCamera(mouse, camera);
      return raycaster.intersectObjects(objects.map(o => o.mesh));
    }

    // ── Drag & interaction ────────────────────────────────────────
    let isDragging = false;
    let dragTarget = null;
    let dragStartMouse = { x: 0, y: 0 };
    let dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    let dragOffset = new THREE.Vector3();

    // For rotation drag
    let rotStartMouse = { x: 0, y: 0 };
    let rotStartQuat = new THREE.Quaternion();

    wrap.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      const hits = raycastObjects(e);

      if (mode === 'move') {
        if (hits.length > 0) {
          const mesh = hits[0].object;
          selectObject(mesh);
          isDragging = true;
          dragTarget = mesh;

          // Find intersection point on a plane at z=0
          getMouseNDC(e);
          raycaster.setFromCamera(mouse, camera);
          const planeHit = new THREE.Vector3();
          raycaster.ray.intersectPlane(dragPlane, planeHit);
          dragOffset.copy(planeHit).sub(mesh.position);

          dragStartMouse = { x: e.clientX, y: e.clientY };
          e.preventDefault();
        } else {
          deselect();
        }
      } else {
        // Rotate mode — rotate selected if clicking on it, else select new
        if (hits.length > 0) {
          const mesh = hits[0].object;
          if (mesh !== selected) selectObject(mesh);
          isDragging = true;
          dragTarget = selected;
          rotStartMouse = { x: e.clientX, y: e.clientY };
          rotStartQuat.copy(selected.quaternion);
          e.preventDefault();
        } else {
          deselect();
        }
      }
    });

    window.addEventListener('mousemove', e => {
      if (!isDragging || !dragTarget) return;

      if (mode === 'move') {
        getMouseNDC(e);
        raycaster.setFromCamera(mouse, camera);
        const planeHit = new THREE.Vector3();
        raycaster.ray.intersectPlane(dragPlane, planeHit);
        dragTarget.position.copy(planeHit.sub(dragOffset));
      } else {
        // Arcball-style rotation
        const dx = (e.clientX - rotStartMouse.x) / wrap.offsetWidth;
        const dy = (e.clientY - rotStartMouse.y) / wrap.offsetHeight;
        const speed = 3.5;

        const qX = new THREE.Quaternion();
        const qY = new THREE.Quaternion();
        qX.setFromAxisAngle(new THREE.Vector3(0, 1, 0), dx * speed);
        qY.setFromAxisAngle(new THREE.Vector3(1, 0, 0), dy * speed);

        dragTarget.quaternion.copy(rotStartQuat);
        dragTarget.quaternion.premultiply(qX);
        dragTarget.quaternion.premultiply(qY);
      }
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
      dragTarget = null;
    });

    // ── Delete ────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (document.activeElement !== document.body) return;
      if ((e.key === 'Delete' || e.key === 'Backspace') && selected) {
        scene.remove(selected);
        objects = objects.filter(o => o.mesh !== selected);
        deselect();
        updateCount();
        const hint = document.getElementById('del-hint');
        hint.classList.add('show');
        setTimeout(() => hint.classList.remove('show'), 1800);
      }
    });

    // ── Resize ────────────────────────────────────────────────────
    function resize() {
      const w = wrap.offsetWidth;
      const h = wrap.offsetHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Render loop ───────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      // Gentle auto-spin on unselected objects
      if (autoSpin) {
        objects.forEach(({ mesh }) => {
          if (mesh !== selected) {
            mesh.rotation.y += 0.003;
            mesh.rotation.x += 0.001;
          }
        });
      }
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
