<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draggable Image Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0efe8;
      min-height: 100vh;
      padding: 24px;
      color: #1a1a18;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 16px;
      color: #1a1a18;
    }

    #canvas {
      position: relative;
      width: 100%;
      height: calc(100vh - 150px);
      min-height: 480px;
      background: #ffffff;
      border-radius: 12px;
      border: 0.5px solid rgba(0,0,0,0.12);
      overflow: hidden;
      cursor: default;
    }

    .empty-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      color: #888780;
      font-size: 14px;
      line-height: 2;
    }

    .img-wrapper {
      position: absolute;
      cursor: grab;
      user-select: none;
      border-radius: 4px;
      border: 2px solid transparent;
      transition: box-shadow 0.15s;
    }
    .img-wrapper:hover { border-color: rgba(0,0,0,0.2); }
    .img-wrapper.dragging {
      cursor: grabbing;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    }
    .img-wrapper.selected { border-color: #378ADD; }
    .img-wrapper img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 2px;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .resize-handle {
      position: absolute;
      bottom: -5px;
      right: -5px;
      width: 14px;
      height: 14px;
      background: #378ADD;
      border-radius: 50%;
      cursor: se-resize;
      display: none;
      z-index: 2;
    }
    .img-wrapper.selected .resize-handle { display: block; }

    .rotate-stem {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 1.5px;
      height: 14px;
      background: #378ADD;
      display: none;
      pointer-events: none;
    }
    .rotate-handle {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 18px;
      background: #378ADD;
      border-radius: 50%;
      cursor: grab;
      display: none;
      z-index: 2;
    }
    .rotate-handle:active { cursor: grabbing; }
    /* Arrow icon inside rotate handle */
    .rotate-handle::before {
      content: '↻';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #fff;
      line-height: 18px;
      text-align: center;
    }
    .img-wrapper.selected .rotate-stem { display: block; }
    .img-wrapper.selected .rotate-handle { display: block; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      flex-wrap: wrap;
    }

    .toolbar button {
      font-size: 13px;
      font-family: inherit;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.2);
      background: #ffffff;
      color: #1a1a18;
      transition: background 0.1s;
    }
    .toolbar button:hover { background: #f0efe8; }
    .toolbar button:active { transform: scale(0.98); }
    .toolbar button.danger { color: #a32d2d; }

    .divider {
      width: 1px;
      height: 22px;
      background: rgba(0,0,0,0.15);
      flex-shrink: 0;
    }

    .hint {
      font-size: 12px;
      color: #888780;
      margin-left: auto;
    }

    #upload-input { display: none; }

    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1a; color: #e8e6de; }
      h1 { color: #e8e6de; }
      #canvas { background: #2a2a28; border-color: rgba(255,255,255,0.1); }
      .empty-msg { color: #5f5e5a; }
      .toolbar button { background: #2a2a28; border-color: rgba(255,255,255,0.15); color: #e8e6de; }
      .toolbar button:hover { background: #333330; }
      .hint { color: #5f5e5a; }
      .divider { background: rgba(255,255,255,0.15); }
    }
  </style>
</head>
<body>

  <h1>Image Canvas</h1>

  <div class="toolbar">
    <button onclick="document.getElementById('upload-input').click()">+ Add image</button>
    <input type="file" id="upload-input" accept="image/*" multiple onchange="handleUpload(event)">
    <div class="divider"></div>
    <button onclick="bringForward()">Bring forward</button>
    <button onclick="sendBackward()">Send backward</button>
    <div class="divider"></div>
    <button onclick="rotateBy(-15)">↺ 15°</button>
    <button onclick="rotateBy(15)">↻ 15°</button>
    <button onclick="rotateBy(-90)">↺ 90°</button>
    <button onclick="rotateBy(90)">↻ 90°</button>
    <button onclick="resetRotation()">Reset angle</button>
    <div class="divider"></div>
    <button class="danger" onclick="deleteSelected()">Remove</button>
    <span class="hint">Click to select · Drag to move · ⬤ corner = resize · ↻ top = rotate · [ ] = rotate 1°</span>
  </div>

  <div id="canvas">
    <div class="empty-msg" id="empty-msg">
      Click <strong>+ Add image</strong> to get started<br>
      or drag &amp; drop images directly onto the canvas
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const emptyMsg = document.getElementById('empty-msg');
    let selected = null;
    let zCounter = 10;
    const rotations = new WeakMap();

    function hideEmpty() { emptyMsg.style.display = 'none'; }

    function applyTransform(el) {
      const deg = rotations.get(el) || 0;
      el.style.transform = 'rotate(' + deg + 'deg)';
    }

    function createWrapper(src, x, y, w, h) {
      hideEmpty();
      const el = document.createElement('div');
      el.className = 'img-wrapper';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.width = w + 'px';
      el.style.height = h + 'px';
      el.style.zIndex = ++zCounter;
      rotations.set(el, 0);

      const img = document.createElement('img');
      img.src = src;
      img.draggable = false;

      const stem = document.createElement('div');
      stem.className = 'rotate-stem';

      const rotHandle = document.createElement('div');
      rotHandle.className = 'rotate-handle';

      const resHandle = document.createElement('div');
      resHandle.className = 'resize-handle';

      el.appendChild(img);
      el.appendChild(stem);
      el.appendChild(rotHandle);
      el.appendChild(resHandle);
      canvas.appendChild(el);

      el.addEventListener('mousedown', onDragStart);
      resHandle.addEventListener('mousedown', onResizeStart);
      rotHandle.addEventListener('mousedown', onRotateStart);
      el.addEventListener('click', e => { e.stopPropagation(); selectEl(el); });

      return el;
    }

    function selectEl(el) {
      if (selected) selected.classList.remove('selected');
      selected = el;
      if (el) {
        el.classList.add('selected');
        el.style.zIndex = ++zCounter;
      }
    }

    canvas.addEventListener('click', () => {
      if (selected) { selected.classList.remove('selected'); selected = null; }
    });

    function onDragStart(e) {
      if (e.target.classList.contains('resize-handle')) return;
      if (e.target.classList.contains('rotate-handle')) return;
      e.preventDefault();
      const el = this;
      selectEl(el);
      el.classList.add('dragging');

      const rect = canvas.getBoundingClientRect();
      const startX = e.clientX - rect.left - parseInt(el.style.left);
      const startY = e.clientY - rect.top - parseInt(el.style.top);

      function onMove(e) {
        let nx = e.clientX - rect.left - startX;
        let ny = e.clientY - rect.top - startY;
        nx = Math.max(0, Math.min(nx, canvas.offsetWidth - el.offsetWidth));
        ny = Math.max(0, Math.min(ny, canvas.offsetHeight - el.offsetHeight));
        el.style.left = nx + 'px';
        el.style.top = ny + 'px';
      }
      function onUp() {
        el.classList.remove('dragging');
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      }
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    }

    function onResizeStart(e) {
      e.preventDefault();
      e.stopPropagation();
      const el = this.parentElement;
      const startX = e.clientX;
      const startY = e.clientY;
      const startW = el.offsetWidth;
      const startH = el.offsetHeight;

      function onMove(e) {
        const nw = Math.max(80, startW + e.clientX - startX);
        const nh = Math.max(60, startH + e.clientY - startY);
        el.style.width = nw + 'px';
        el.style.height = nh + 'px';
      }
      function onUp() {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      }
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    }

    function onRotateStart(e) {
      e.preventDefault();
      e.stopPropagation();
      const el = this.parentElement;
      selectEl(el);

      function getCenter() {
        const r = el.getBoundingClientRect();
        return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      }

      const c = getCenter();
      const startAngle = Math.atan2(e.clientY - c.y, e.clientX - c.x) * 180 / Math.PI;
      const startRot = rotations.get(el) || 0;

      function onMove(e) {
        const c = getCenter();
        const angle = Math.atan2(e.clientY - c.y, e.clientX - c.x) * 180 / Math.PI;
        rotations.set(el, startRot + (angle - startAngle));
        applyTransform(el);
      }
      function onUp() {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      }
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    }

    function rotateBy(deg) {
      if (!selected) return;
      rotations.set(selected, (rotations.get(selected) || 0) + deg);
      applyTransform(selected);
    }

    function resetRotation() {
      if (!selected) return;
      rotations.set(selected, 0);
      applyTransform(selected);
    }

    function bringForward() {
      if (selected) selected.style.zIndex = ++zCounter;
    }

    function sendBackward() {
      if (selected) {
        const z = parseInt(selected.style.zIndex);
        if (z > 1) selected.style.zIndex = z - 2;
      }
    }

    function deleteSelected() {
      if (selected) {
        canvas.removeChild(selected);
        selected = null;
        if (canvas.querySelectorAll('.img-wrapper').length === 0) {
          emptyMsg.style.display = '';
        }
      }
    }

    function handleUpload(e) {
      [...e.target.files].forEach((file, i) => {
        createWrapper(URL.createObjectURL(file), 40 + i * 30, 40 + i * 30, 220, 160);
      });
      e.target.value = '';
    }

    canvas.addEventListener('dragover', e => e.preventDefault());
    canvas.addEventListener('drop', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      [...e.dataTransfer.files]
        .filter(f => f.type.startsWith('image/'))
        .forEach((file, i) => {
          createWrapper(
            URL.createObjectURL(file),
            e.clientX - rect.left - 110 + i * 25,
            e.clientY - rect.top - 80 + i * 25,
            220, 160
          );
        });
    });

    document.addEventListener('keydown', e => {
      if (document.activeElement !== document.body) return;
      if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
      if (e.key === '[') rotateBy(-1);
      if (e.key === ']') rotateBy(1);
      if (e.key === '{') rotateBy(-15);
      if (e.key === '}') rotateBy(15);
    });
  </script>

</body>
</html>
